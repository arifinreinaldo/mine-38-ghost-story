<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Maut di Mahameru">
  <defs>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f3f2ed"/>
      <stop offset="0.5" stop-color="#c7ccd3"/>
      <stop offset="1" stop-color="#969da7"/>
    </linearGradient>
    <linearGradient id="grip" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3a2a22"/>
      <stop offset="1" stop-color="#190f0b"/>
    </linearGradient>
    <linearGradient id="blood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#b03636"/>
      <stop offset="1" stop-color="#6f1c1c"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="86%" r="62%">
      <stop offset="0" stop-color="#9a3030" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#9a3030" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="64" height="64" rx="14" fill="#14171c"/>
  <rect width="64" height="64" rx="14" fill="url(#glow)"/>

  <!-- blade -->
  <path d="M26.5 25 L37.5 25 L32 54 Z" fill="url(#steel)"/>
  <path d="M32 25 L37.5 25 L32 54 Z" fill="#878e98" opacity="0.5"/>
  <line x1="32" y1="27.5" x2="32" y2="49" stroke="#6f767f" stroke-width="0.8" opacity="0.55"/>

  <!-- bloodied tip + drips -->
  <path d="M30.1 45 L33.9 45 L32 54 Z" fill="url(#blood)"/>
  <path d="M32 53 q-2.4 4 0 7 q2.4 -3 0 -7 Z" fill="url(#blood)"/>
  <path d="M37 49 q-1.6 3 0 4.6 q1.6 -1.6 0 -4.6 Z" fill="url(#blood)" opacity="0.92"/>

  <!-- crossguard -->
  <rect x="18" y="21.5" width="28" height="4" rx="2" fill="url(#steel)"/>

  <!-- grip + wraps -->
  <rect x="29.2" y="9.5" width="5.6" height="12.5" rx="2.2" fill="url(#grip)"/>
  <line x1="29.6" y1="13" x2="34.4" y2="13" stroke="#c8642a" stroke-width="0.9" opacity="0.7"/>
  <line x1="29.6" y1="16" x2="34.4" y2="16" stroke="#c8642a" stroke-width="0.9" opacity="0.7"/>
  <line x1="29.6" y1="19" x2="34.4" y2="19" stroke="#c8642a" stroke-width="0.9" opacity="0.7"/>

  <!-- pommel -->
  <circle cx="32" cy="8.6" r="3.3" fill="url(#steel)"/>
</svg>
